name: Tractor
options:
  deploymentTarget:
    macOS: "15.0"
  bundleIdPrefix: com.jacobgroundwater

configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig

settings:
  configs:
    Release:
      ENABLE_HARDENED_RUNTIME: YES
      CODE_SIGN_STYLE: Automatic
      OTHER_CODE_SIGN_FLAGS: --timestamp

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.3.0"
  swift-certificates:
    url: https://github.com/apple/swift-certificates
    from: "1.0.0"
  swift-crypto:
    url: https://github.com/apple/swift-crypto
    from: "3.0.0"

targetTemplates:
  TractorCommon:
    platform: macOS
    sources:
      - path: Sources/Tractor
        excludes:
          - "*.png"
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_NAME: Tractor
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Sources/Tractor/Tractor.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Tractor/BridgingHeader.h
        OTHER_LDFLAGS:
          - "-lEndpointSecurity"
          - "-lbsm"
          - "-lsqlite3"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemExtensions"
    entitlements:
      path: Sources/Tractor/Tractor.entitlements
      properties:
        com.apple.developer.endpoint-security.client: true
        com.apple.developer.system-extension.install: true
        com.apple.developer.networking.networkextension:
          - app-proxy-provider-systemextension
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - group.com.jacobgroundwater.Tractor

targets:
  Tractor:
    templates:
      - TractorCommon
    type: tool
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "-"
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGN_STYLE: Automatic
          OTHER_CODE_SIGN_FLAGS: ""

  TractorNE:
    type: bundle
    platform: macOS
    sources:
      - path: Sources/TractorNE
    dependencies:
      - package: swift-certificates
        product: X509
      - package: swift-crypto
        product: Crypto
      - package: swift-crypto
        product: _CryptoExtras
    info:
      path: Sources/TractorNE/Info.plist
      properties:
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: "0.8.0"
        CFBundleVersion: "145"
        LSMinimumSystemVersion: "15.0"
        NSSystemExtensionUsageDescription: "Tractor uses a network extension to monitor and intercept network traffic."
        NetworkExtension:
          NEProviderClasses:
            com.apple.networkextension.app-proxy: "$(PRODUCT_MODULE_NAME).TransparentProxy"
          NEMachServiceName: group.com.jacobgroundwater.Tractor
    settings:
      base:
        PRODUCT_NAME: com.jacobgroundwater.Tractor.NE
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobgroundwater.Tractor.NE
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Sources/TractorNE/TractorNE.entitlements
        INFOPLIST_FILE: Sources/TractorNE/Info.plist
        SKIP_INSTALL: "YES"
        WRAPPER_EXTENSION: systemextension
        MACH_O_TYPE: mh_execute
      configs:
        Debug:
          PROVISIONING_PROFILE_SPECIFIER: ""

  TractorApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/Tractor
        excludes:
          - "*.png"
      - path: icon/Tractor.icns
        buildPhase: resources
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser
      - target: TractorNE
        embed: false
    postBuildScripts:
      - script: |
          set -e
          SYSEXT_NAME="com.jacobgroundwater.Tractor.NE.systemextension"
          # TARGET_BUILD_DIR works for plain builds; during archive, sysexts
          # (SKIP_INSTALL=YES) land elsewhere — fall back to searching the build root.
          if [ -d "${TARGET_BUILD_DIR}/${SYSEXT_NAME}" ]; then
            SYSEXT_SRC="${TARGET_BUILD_DIR}/${SYSEXT_NAME}"
          else
            SYSEXT_SRC="$(find "${OBJROOT}" "${SYMROOT}" -type d -name "${SYSEXT_NAME}" -not -path "*/${WRAPPER_NAME}/*" 2>/dev/null | head -1)"
          fi
          if [ -z "${SYSEXT_SRC}" ] || [ ! -d "${SYSEXT_SRC}" ]; then
            echo "error: could not locate built ${SYSEXT_NAME}"; exit 1
          fi
          SYSEXT_DST="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Library/SystemExtensions"
          mkdir -p "${SYSEXT_DST}"
          ditto "${SYSEXT_SRC}" "${SYSEXT_DST}/${SYSEXT_NAME}"
          # Debug: ad-hoc resign so the outer app's seal covers the embedded sysext.
          # Release: skip — `xcodebuild -exportArchive` re-signs everything from
          # scratch with Developer ID and the hardened runtime.
          if [ "${CONFIGURATION}" != "Release" ]; then
            /usr/bin/codesign --force \
              --sign - \
              --entitlements "${SRCROOT}/Sources/Tractor/TractorApp.entitlements" \
              --timestamp=none \
              "${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          fi
        name: "Embed System Extension"
    entitlements:
      path: Sources/Tractor/TractorApp.entitlements
      properties:
        com.apple.developer.endpoint-security.client: true
        com.apple.developer.system-extension.install: true
        com.apple.developer.networking.networkextension:
          - app-proxy-provider-systemextension
        com.apple.security.application-groups:
          - group.com.jacobgroundwater.Tractor
    info:
      path: Sources/Tractor/Info.plist
      properties:
        CFBundleIdentifier: com.jacobgroundwater.Tractor
        CFBundleName: Tractor
        CFBundleDisplayName: Tractor
        CFBundleExecutable: Tractor
        CFBundleIconFile: Tractor
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSHighResolutionCapable: true
        NSSystemExtensionUsageDescription: "Tractor uses a network extension to monitor and intercept network traffic for security analysis."
    settings:
      base:
        PRODUCT_NAME: Tractor
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: Sources/Tractor/TractorApp.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Tractor/BridgingHeader.h
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobgroundwater.Tractor
        INFOPLIST_FILE: Sources/Tractor/Info.plist
        OTHER_LDFLAGS:
          - "-lEndpointSecurity"
          - "-lbsm"
          - "-lsqlite3"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemExtensions"
